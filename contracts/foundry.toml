[profile.default]
src = "src"
out = "out"
libs = ["node_modules"]
solc_version = "0.8.25"
via_ir = true
optimizer = true
optimizer_runs = 200

[rpc_endpoints]
celoAlfajores = "${CELO_ALFAJORES_URL}"

[etherscan]
11142220 = { key = "${CELOSCAN_API_KEY}", url = "https://api-sepolia.celoscan.io/api" }
